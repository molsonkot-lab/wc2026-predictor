name: auto-tune

on:
  schedule:
    - cron: "0 6 * * *"      # 每天 06:00 UTC
  workflow_dispatch:          # 也可在 Actions 页手动触发

permissions:
  contents: write             # 允许把调参结果 commit 回仓库

concurrency:
  group: auto-tune
  cancel-in-progress: false

jobs:
  tune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Snapshot + tune market_weight
        run: python scripts/auto_tune.py

      - name: Commit results if changed
        run: |
          git config user.name  "wc2026-autotune-bot"
          git config user.email "actions@github.com"
          git add tuned_params.json data/prediction_log.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "auto-tune: refresh snapshots & market_weight [skip ci]"
            git push
          fi
